<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6324eb",
                        "background-light": "#f6f6f8",
                        "background-dark": "#161121",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>University Library System - Login</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-md">
<!-- Logo/Header Section -->
<div class="flex flex-col items-center mb-8">
<div class="bg-primary/10 p-3 rounded-xl mb-4">
<span class="material-symbols-outlined text-primary text-4xl">local_library</span>
</div>
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-bold tracking-tight text-center">University Library System</h1>
<p class="text-slate-500 dark:text-slate-400 mt-2 text-center">Welcome back! Please enter your details.</p>
</div>
<!-- Login Card -->
<div class="bg-white dark:bg-slate-900 shadow-xl shadow-primary/5 rounded-xl border border-slate-200 dark:border-slate-800 p-8">
<form action="#" class="space-y-6" method="POST">
<!-- Email Input -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300" for="email">
                        Email Address
                    </label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 text-lg">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-slate-200 dark:border-slate-700 rounded-lg bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" id="email" name="email" placeholder="name@university.edu" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex items-center justify-between">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300" for="password">
                            Password
                        </label>
<a class="text-sm font-medium text-primary hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 text-lg">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-slate-200 dark:border-slate-700 rounded-lg bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Error Message Placeholder -->
<div class="flex items-center gap-2 p-3 rounded-lg bg-red-50 dark:bg-red-900/20 border border-red-100 dark:border-red-900/30">
<span class="material-symbols-outlined text-red-600 dark:text-red-400 text-sm">error</span>
<p class="text-red-600 dark:text-red-400 text-xs font-medium">Invalid email or password. Please try again.</p>
</div>
<!-- Login Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3 px-4 rounded-lg transition-colors focus:ring-4 focus:ring-primary/30 flex items-center justify-center gap-2" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-lg">login</span>
</button>
<!-- SSO Alternative -->
<div class="relative my-6">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-200 dark:border-slate-800"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-2 bg-white dark:bg-slate-900 text-slate-500">Or continue with</span>
</div>
</div>
<button class="w-full flex items-center justify-center gap-3 px-4 py-3 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors font-medium" type="button">
<img alt="" class="w-5 h-5" data-alt="Google authentication service logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAXUh7xezvIhkKcrH_lX4gIHSdHS7BJEGbJ4_t3-_OiqIYQdLYE36cqMp5WBUdvOmUQEOHlrO3Ip9ttwQaJ_olzRaFSz6ZS9P3aoqDzZrCLRRH_dlEZzfkn_efJNBZpmaAdXAnsRBxAjFBKrTPAazSTT5wAU3mVZp0g4o6oRPh5C_la23UJByxkZn0ZoD6TKQQOFj8IA91k4CLIFWqi3ViJhYLDztpR4H9tURpu7QcRlYZOViXEPoVGKmhwLLV9iufzDwz-nGaADEo"/>
                    University SSO
                </button>
</form>
</div>
<!-- Footer -->
<footer class="mt-8 text-center space-y-4">
<p class="text-slate-500 dark:text-slate-400 text-sm">
                Don't have an account? 
                <a class="text-primary font-semibold hover:underline" href="#">Contact Student Services</a>
</p>
<div class="flex justify-center gap-6 text-xs text-slate-400 dark:text-slate-600">
<a class="hover:text-primary" href="#">Help Center</a>
<a class="hover:text-primary" href="#">Privacy Policy</a>
<a class="hover:text-primary" href="#">Library Terms</a>
</div>
</footer>
</div>
<!-- Decorative Elements (Abstract Patterns) -->
<div class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden pointer-events-none opacity-20">
<div class="absolute -top-24 -left-24 w-96 h-96 bg-primary rounded-full mix-blend-multiply filter blur-3xl opacity-30"></div>
<div class="absolute top-1/2 -right-24 w-80 h-80 bg-blue-400 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
</div>
</body></html>
